<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog - Azka Z.</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: #e9e9e9;
      color: #222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
      padding: 60px 40px;
      flex: 1;
    }

    header {
      text-align: center;
      margin-bottom: 100px;
    }

    header h1 {
      font-size: 2rem;
      letter-spacing: 6px;
      font-weight: bold;
    }

    .blog-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .blog-header h2 {
      font-size: 2rem;
      letter-spacing: 5px;
      font-weight: normal;
    }

    .search-icon {
      font-size: 1.4rem;
      cursor: pointer;
    }

    .blog-category {
      font-size: 1rem;
      margin-bottom: 180px;
      color: #333;
    }

    .empty-blog {
      text-align: center;
      margin-top: 80px;
    }

    .empty-blog h3 {
      font-size: 3rem;
      font-weight: normal;
      margin-bottom: 20px;
    }

    .empty-blog p {
      font-size: 1.1rem;
      color: #444;
    }

    footer {
      padding-bottom: 30px;
    }

    .footer-nav {
      background: linear-gradient(to right, #2a2a2a, #111);
      padding: 18px 10px;
      display: flex;
      justify-content: center;
      gap: 34px;
      flex-wrap: wrap;
      max-width: 1100px;
      margin: 0 auto;
    }

    .footer-nav a {
      color: white;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: bold;
      text-transform: uppercase;
    }

    .footer-nav a.active {
      color: #d8c74f;
    }

    .footer-nav a:hover {
      color: #d6d6d6;
    }

    .copyright {
      text-align: center;
      margin-top: 16px;
      font-size: 0.7rem;
      color: #444;
    }

    @media (max-width: 768px) {
      .blog-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 20px;
      }

      .blog-category {
        margin-bottom: 100px;
      }

      .empty-blog h3 {
        font-size: 2.2rem;
      }
    }

    @media (max-width: 600px) {
      .container {
        padding: 40px 20px;
      }

      header h1 {
        font-size: 1.5rem;
      }

      .blog-header h2 {
        font-size: 1.4rem;
      }

      .footer-nav {
        gap: 18px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>AZKA Z.</h1>
    </header>

    <section class="blog-section">
      <div class="blog-header">
        <h2>WELCOME TO MY BLOG</h2>
        <div class="search-icon">⌕</div>
      </div>

      <div class="blog-category">All Posts</div>

      <div class="empty-blog">
        <h3>Check back soon</h3>
        <p>Once posts are published, you'll see them here.</p>
      </div>
    </section>
  </div>

  <footer>
    <nav class="footer-nav">
      <a href="index.html">Portfolio</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="blog.html" class="active">Blog</a>
      <a href="#">Book Online</a>
    </nav>

    <div class="copyright">
      2026 Azka Z. All right reserved.
    </div>
  </footer>

</body>
</html>
