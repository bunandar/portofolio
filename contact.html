<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Azka Z.</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: #e9e9e9;
      color: #222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
      padding: 60px 40px;
      flex: 1;
    }

    header {
      text-align: center;
      margin-bottom: 120px;
    }

    header h1 {
      font-size: 2rem;
      letter-spacing: 6px;
      font-weight: bold;
    }

    .contact-section {
      max-width: 500px;
      margin-left: 180px;
    }

    .contact-section h2 {
      font-size: 2rem;
      letter-spacing: 5px;
      font-weight: normal;
      margin-bottom: 70px;
    }

    .contact-info {
      font-size: 1.1rem;
      line-height: 2.2;
      color: #333;
    }

    .contact-info a {
      color: #222;
      text-decoration: none;
    }

    .contact-info a:hover {
      text-decoration: underline;
    }

    footer {
      margin-top: auto;
      padding-bottom: 30px;
    }

    .footer-nav {
      background: linear-gradient(to right, #2a2a2a, #111);
      padding: 18px 10px;
      display: flex;
      justify-content: center;
      gap: 34px;
      flex-wrap: wrap;
      max-width: 1100px;
      margin: 0 auto;
    }

    .footer-nav a {
      color: white;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: bold;
      text-transform: uppercase;
    }

    .footer-nav a.active {
      color: #d8c74f;
    }

    .footer-nav a:hover {
      color: #d6d6d6;
    }

    @media (max-width: 900px) {
      .contact-section {
        margin-left: 60px;
      }
    }

    @media (max-width: 600px) {
      .container {
        padding: 40px 20px;
      }

      header {
        margin-bottom: 80px;
      }

      header h1 {
        font-size: 1.5rem;
      }

      .contact-section {
        margin-left: 0;
      }

      .contact-section h2 {
        font-size: 1.6rem;
        margin-bottom: 40px;
      }

      .footer-nav {
        gap: 18px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>AZKA Z.</h1>
    </header>

    <section class="contact-section">
      <h2>CONTACT</h2>

      <div class="contact-info">
        <p><a href="mailto:info@mysite.com">info@mysite.com</a></p>
        <p>Tel: 123-456-7890</p>
      </div>
    </section>
  </div>

  <footer>
    <nav class="footer-nav">
      <a href="index.html">Portfolio</a>
      <a href="about.html">About</a>
      <a href="contact.html" class="active">Contact</a>
      <a href="blog.html">Blog</a>
      <a href="#">Book Online</a>
    </nav>
    
  </footer>

</body>
</html>
