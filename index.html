<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portofolio</title>
  <style>
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: #e9e9e9;
      color: #222;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 60px 40px 30px;
      text-align: center;
    }

    header h1 {
      font-size: 2rem;
      letter-spacing: 6px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    header p {
      font-size: 1rem;
      letter-spacing: 5px;
      color: #333;
      margin-bottom: 60px;
    }

    .portfolio-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 26px;
      margin-bottom: 70px;
    }

    .portfolio-item {
      background: #ddd;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .portfolio-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 18px rgba(0,0,0,0.12);
    }

    .portfolio-item img {
      width: 100%;
      height: 101%;
      object-fit: fill;
      display: block;
      aspect-ratio: 3 / 3;
    }

    .portfolio-item.tall img {
      aspect-ratio: 4 / 5.3;
    }

    footer {
      margin-top: 20px;
    }

    .footer-nav {
      background: linear-gradient(to right, #2a2a2a, #111);
      padding: 18px 10px;
      display: flex;
      justify-content: center;
      gap: 34px;
      flex-wrap: wrap;
    }

    .footer-nav a {
      color: white;
      text-decoration: none;
      font-size: 0.78rem;
      letter-spacing: 1px;
      font-weight: bold;
      text-transform: uppercase;
    }

    .footer-nav a:hover {
      color: #d6d6d6;
    }

    .copyright {
      margin-top: 18px;
      font-size: 0.7rem;
      color: #444;
    }

    .copyright a {
      color: #444;
    }

    @media (max-width: 900px) {
      .portfolio-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      .container {
        padding: 40px 20px;
      }

      header h1 {
        font-size: 1.5rem;
      }

      header p {
        font-size: 0.85rem;
        letter-spacing: 3px;
      }

      .portfolio-grid {
        grid-template-columns: 1fr;
      }

      .footer-nav {
        gap: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Azka Z.</h1>
      <p>GRAPHIC DESIGN PORTFOLIO</p>
    </header>

    <section class="portfolio-grid">
      <div class="portfolio-item"><img src="images/7.jpeg" alt="Project 1"></div>
      <div class="portfolio-item"><img src="images/8.jpeg" alt="Project 2"></div>
      <div class="portfolio-item"><img src="images/1.jpeg" alt="Project 3"></div>
      <div class="portfolio-item"><img src="images/3.jpeg" alt="Project 4"></div>
      <div class="portfolio-item"><img src="images/2.jpeg" alt="Project 5"></div>
      <div class="portfolio-item"><img src="images/10.jpeg" alt="Project 6"></div>
      <div class="portfolio-item"><img src="images/9.jpeg" alt="Project 7"></div>
      <div class="portfolio-item tall"><img src="images/5.jpeg" alt="Project 8"></div>
      <div class="portfolio-item"><img src="images/4.jpeg" alt="Project 9"></div>
    </section>

    <footer>
    <nav class="footer-nav">
      <a href="index.html" class="active">Portfolio</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="blog.html">Blog</a>
      <a href="#">Book Online</a>
    </nav>
  </footer>
      <div class="copyright">
        2026 Azka Z. All right reserved.
      </div>
    </footer>
  </div>
</body>
</
